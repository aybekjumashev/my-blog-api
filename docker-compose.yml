services:
  db:
    image: postgres:17-alpine 
    volumes:
      - postgres_data:/var/lib/postgresql/data/ 
    env_file:
      - .env

  web:
    build: . 
    volumes:
      - .:/app  
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000" 
    depends_on:
      - db 
    env_file:
      - .env

volumes:
  postgres_data:
  static_volume: